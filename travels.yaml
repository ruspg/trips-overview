# ============================================================================
# TRAVEL DATABASE — Structure & Rules
# ============================================================================
#
# RULES:
#   1. DATES:       ISO 8601 format: YYYY-MM-DD
#   2. TIMES:       24h with timezone: "HH:MM +TZ"
#   3. PRICES:      amount + currency as separate fields
#   4. AIRPORTS:    IATA 3-letter codes (SVO, BKK, HAN, etc.)
#   5. TRIP ID:     Slug: "YYYY-MM-country"
#   6. OPTIONAL:    Omit the key if no data (don't use null/empty)
#   7. NOTES:       Free-form text for extras
#   8. NO PII:      No names, passports, phones, emails, or booking IDs
#
# ============================================================================

