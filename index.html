<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Explorer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root {
    --bg: #05050a;
    --surface: #0c0c14;
    --surface2: #12121c;
    --surface3: #1a1a28;
    --border: #222234;
    --text: #eaeaf4;
    --text-dim: #8888a0;
    --text-muted: #55556a;
    --accent: #6366f1;
    --accent-glow: #818cf8;
    --accent2: #f472b6;
    --accent3: #34d399;
    --radius: 14px;
    --radius-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  /* ========== HEADER ========== */
  .header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    background: rgba(5,5,10,0.6);
    backdrop-filter: blur(24px) saturate(1.8);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    padding: 0 24px; height: 52px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 18px; }
  .header h1 {
    font-size: 16px; font-weight: 800; letter-spacing: -0.03em;
    background: linear-gradient(135deg, #a5b4fc, #f0abfc);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header-stats { display: flex; gap: 18px; font-size: 11px; color: var(--text-muted); }
  .header-stats strong { color: var(--text-dim); font-weight: 600; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  .nav-pills { display: flex; gap: 2px; background: rgba(255,255,255,0.03); border-radius: 9px; padding: 3px; }
  .nav-pill {
    padding: 5px 13px; border-radius: 7px; font-size: 11px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; color: var(--text-muted); border: none; background: none;
  }
  .nav-pill:hover { color: var(--text); }
  .nav-pill.active { color: #fff; background: var(--accent); }

  /* ========== GLOBE ========== */
  #globe-container {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    z-index: 0;
  }
  /* HTML city labels on globe */
  .globe-label {
    font-family: 'Inter', sans-serif;
    white-space: nowrap;
    text-shadow: 0 0 6px rgba(0,0,0,0.9), 0 0 12px rgba(0,0,0,0.6), 0 1px 2px rgba(0,0,0,0.8);
    transform: translate(-50%, -100%);
    padding-bottom: 2px;
    user-select: none;
  }
  .globe-label.gl-p1 { font-size: 13px; font-weight: 700; color: #e8e8ff; }
  .globe-label.gl-p2 { font-size: 11px; font-weight: 600; color: #b8b8d8; }
  .globe-label.gl-p3 { font-size: 10px; font-weight: 500; color: #8888a8; }

  /* ========== TRIP PANEL (left) ========== */
  .trip-panel {
    position: fixed; left: 14px; top: 64px; bottom: 14px;
    width: 300px; z-index: 150;
    background: rgba(8,8,14,0.88);
    backdrop-filter: blur(24px) saturate(1.5);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: var(--radius);
    display: flex; flex-direction: column; overflow: hidden;
    transition: transform 0.3s, opacity 0.3s;
  }
  .trip-panel.hidden { transform: translateX(-320px); opacity: 0; pointer-events: none; }
  .trip-panel-header { padding: 14px 16px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .trip-panel-header h2 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }
  .trip-panel-body { flex: 1; overflow-y: auto; padding: 6px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  .trip-item {
    padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer;
    transition: all 0.2s; margin-bottom: 2px; border: 1px solid transparent;
  }
  .trip-item:hover { background: rgba(255,255,255,0.04); }
  .trip-item.active { background: rgba(99,102,241,0.1); border-color: rgba(99,102,241,0.25); }
  .trip-item-top { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
  .trip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .trip-item-title { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .trip-item-meta { font-size: 10px; color: var(--text-muted); padding-left: 16px; display: flex; gap: 6px; align-items: center; }
  .badge-ongoing {
    display: inline-block; padding: 1px 6px; border-radius: 100px;
    font-size: 8px; font-weight: 700; text-transform: uppercase;
    background: rgba(52,211,153,0.2); color: var(--accent3); letter-spacing: 0.04em;
  }
  .year-divider {
    padding: 8px 12px 4px;
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.12em; color: var(--text-muted);
    display: flex; align-items: center; gap: 8px;
  }
  .year-divider::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(to right, rgba(255,255,255,0.06), transparent);
  }
  .year-divider .year-label {
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    color: var(--accent-glow); font-weight: 600;
  }

  .panel-toggle {
    position: fixed; left: 14px; top: 64px; z-index: 160;
    width: 34px; height: 34px; border-radius: 9px;
    background: rgba(8,8,14,0.85); backdrop-filter: blur(12px);
    border: 1px solid var(--border); color: var(--text);
    cursor: pointer; display: none; align-items: center; justify-content: center; font-size: 14px;
  }
  .trip-panel.hidden ~ .panel-toggle { display: flex; }

  /* ========== TRIP DETAIL (right) ========== */
  .trip-detail {
    position: fixed; right: 14px; top: 64px; bottom: 14px;
    width: 360px; z-index: 150;
    background: rgba(8,8,14,0.90);
    backdrop-filter: blur(24px) saturate(1.5);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: var(--radius);
    overflow: hidden;
    transform: translateX(400px); opacity: 0;
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
    display: flex; flex-direction: column;
  }
  .trip-detail.visible { transform: translateX(0); opacity: 1; }
  .trip-detail-header { padding: 18px; border-bottom: 1px solid rgba(255,255,255,0.04); position: relative; }
  .trip-detail-close {
    position: absolute; top: 10px; right: 10px;
    width: 26px; height: 26px; border-radius: 7px;
    background: rgba(255,255,255,0.04); border: none; color: var(--text-dim);
    cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center;
  }
  .trip-detail-close:hover { background: rgba(255,255,255,0.08); color: var(--text); }
  .trip-detail-title { font-size: 17px; font-weight: 800; letter-spacing: -0.03em; padding-right: 30px; line-height: 1.3; }
  .trip-detail-dates { font-size: 11px; color: var(--text-dim); margin-top: 5px; }
  .trip-detail-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
  .trip-tag { padding: 2px 9px; border-radius: 100px; font-size: 10px; font-weight: 600; background: rgba(255,255,255,0.04); color: var(--text-dim); }
  .trip-detail-body { flex: 1; overflow-y: auto; padding: 14px 18px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  .detail-section { margin-bottom: 18px; }
  .detail-section-title { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); font-weight: 700; margin-bottom: 8px; }
  .d-item { padding: 8px 10px; background: rgba(255,255,255,0.02); border-radius: 7px; margin-bottom: 3px; border: 1px solid rgba(255,255,255,0.02); transition: all 0.15s; }
  .d-item:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.05); }
  .d-item-primary { font-size: 12px; font-weight: 600; }
  .d-item-secondary { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
  .d-item-accent { color: var(--accent-glow); }

  /* ========== HOVER TOOLTIP ========== */
  .globe-tooltip {
    position: fixed; z-index: 500; pointer-events: none;
    background: rgba(8,8,14,0.92); backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
    padding: 10px 14px; max-width: 300px;
    opacity: 0; transform: translateY(4px);
    transition: opacity 0.12s, transform 0.12s;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  .globe-tooltip.visible { opacity: 1; transform: translateY(0); }
  .tt-title { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
  .tt-sub { font-size: 11px; color: var(--text-dim); }
  .tt-trips { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
  .tt-trip { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim); }
  .tt-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

  /* ========== MINI STATS (bottom-right) ========== */
  .stats-overlay {
    position: fixed; bottom: 14px; right: 14px; z-index: 150;
    display: flex; gap: 5px;
  }
  .mini-stat {
    background: rgba(8,8,14,0.8); backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.05); border-radius: 9px;
    padding: 8px 12px; text-align: center; min-width: 64px;
  }
  .mini-stat-val { font-size: 16px; font-weight: 800; font-family: 'JetBrains Mono', monospace; letter-spacing: -0.03em; }
  .mini-stat-label { font-size: 8px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 1px; font-weight: 600; }

  /* ========== VIEWS ========== */
  .view-panel { display: none; }
  .view-panel.active { display: block; }

  /* timeline & stats views - scrollable */
  .scroll-view { position: fixed; top: 52px; left: 0; right: 0; bottom: 0; overflow-y: auto; background: var(--bg); z-index: 100; }
  .tl-wrap { max-width: 860px; margin: 32px auto 40px; padding: 0 24px; }
  .tl-title { font-size: 28px; font-weight: 900; letter-spacing: -0.04em; margin-bottom: 32px; }
  .tl-title span { background: linear-gradient(135deg, var(--accent-glow), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .tl { position: relative; padding-left: 32px; }
  .tl::before { content:''; position:absolute; left:11px; top:6px; bottom:6px; width:2px; border-radius:2px; background:linear-gradient(to bottom,var(--accent),var(--accent2),var(--accent3)); opacity:0.2; }
  .tl-card { position:relative; margin-bottom:20px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; cursor:pointer; transition:all 0.25s; }
  .tl-card:hover { border-color:rgba(99,102,241,0.35); transform:translateX(3px); box-shadow:0 4px 20px rgba(99,102,241,0.06); }
  .tl-card::before { content:''; position:absolute; left:-27px; top:18px; width:10px; height:10px; border-radius:50%; background:var(--accent); border:3px solid var(--bg); }
  .tl-card.ongoing { border-color:rgba(52,211,153,0.25); }
  .tl-card.ongoing::before { background:var(--accent3); box-shadow:0 0 10px var(--accent3); animation:tlp 2s infinite; }
  @keyframes tlp { 0%,100%{box-shadow:0 0 4px var(--accent3)}50%{box-shadow:0 0 12px var(--accent3)} }
  .tl-card-head { padding:14px 18px; display:flex; justify-content:space-between; align-items:flex-start; }
  .tl-card-title { font-size:15px; font-weight:700; letter-spacing:-0.02em; }
  .tl-card-sub { font-size:11px; color:var(--text-dim); margin-top:3px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .tl-card-flags { font-size:18px; flex-shrink:0; }
  .tl-card-body { display:none; padding:0 18px 14px; border-top:1px solid var(--border); }
  .tl-card.expanded .tl-card-body { display:block; padding-top:12px; }
  .tl-dg { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:10px; }
  .tl-bl { background:var(--surface2); border-radius:var(--radius-sm); padding:12px; }
  .tl-bl h4 { font-size:9px; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-muted); margin-bottom:6px; font-weight:700; }
  .tl-bi { padding:5px 0; border-bottom:1px solid rgba(255,255,255,0.02); font-size:12px; }
  .tl-bi:last-child { border-bottom:none; }
  .tl-bi-m { font-weight:600; }
  .tl-bi-s { color:var(--text-muted); font-size:10px; margin-top:1px; }

  /* stats view */
  .stats-wrap { max-width: 960px; margin: 32px auto 40px; padding: 0 24px; }
  .sg { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:8px; margin-bottom:32px; }
  .sg-c { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:18px; text-align:center; }
  .sg-i { font-size:22px; margin-bottom:4px; }
  .sg-v { font-size:26px; font-weight:900; font-family:'JetBrains Mono',monospace; letter-spacing:-0.04em; }
  .sg-l { font-size:9px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-top:2px; font-weight:600; }
  .bar-chart { display:flex; flex-direction:column; gap:5px; margin-bottom:32px; }
  .bar-row { display:flex; align-items:center; gap:8px; }
  .bar-lbl { width:150px; font-size:11px; color:var(--text-dim); text-align:right; flex-shrink:0; }
  .bar-trk { flex:1; height:22px; background:var(--surface); border-radius:5px; overflow:hidden; }
  .bar-fl { height:100%; border-radius:5px; display:flex; align-items:center; padding:0 8px; transition:width 1s ease; }
  .bar-fl span { font-size:9px; font-weight:700; color:#fff; white-space:nowrap; }
  .cg { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:8px; }
  .cg-c { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px; text-align:center; transition:all 0.2s; }
  .cg-c:hover { border-color:var(--accent); transform:translateY(-2px); }
  .cg-f { font-size:28px; }
  .cg-n { font-size:12px; font-weight:600; margin-top:3px; }
  .cg-ct { font-size:10px; color:var(--text-muted); font-family:'JetBrains Mono',monospace; }

  /* ========== MOBILE: <= 768px ========== */
  @media (max-width:768px) {
    .header { height: 48px; padding: 0 12px; }
    .header-left { gap: 10px; }
    .header h1 { font-size: 14px; }
    .header-stats { display: none; }
    .nav-pill { padding: 4px 10px; font-size: 10px; }

    /* Trip panel → bottom sheet */
    .trip-panel {
      left: 0; right: 0; top: auto; bottom: 0;
      width: 100%; height: 45vh; max-height: 50vh;
      border-radius: 18px 18px 0 0;
      transform: translateY(0);
      z-index: 180;
    }
    .trip-panel.hidden {
      transform: translateY(100%);
    }
    .trip-panel-header {
      padding: 10px 16px 8px;
      display: flex; align-items: center; justify-content: space-between;
    }
    /* drag handle */
    .trip-panel-header::before {
      content: ''; position: absolute; top: 6px; left: 50%; transform: translateX(-50%);
      width: 32px; height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.15);
    }
    .trip-panel-body { padding: 4px 8px; }
    .trip-item { padding: 10px; }
    .trip-item-title { font-size: 13px; }
    .trip-item-meta { font-size: 11px; gap: 8px; }

    /* Panel toggle → bottom center */
    .panel-toggle {
      left: 50%; top: auto; bottom: 14px;
      transform: translateX(-50%);
      width: auto; padding: 8px 20px;
      border-radius: 100px;
      font-size: 12px; font-weight: 600;
      gap: 6px;
    }
    .trip-panel.hidden ~ .panel-toggle { display: flex; }

    /* Trip detail → full screen overlay */
    .trip-detail {
      left: 0; right: 0; top: 48px; bottom: 0;
      width: 100%; border-radius: 0;
      transform: translateY(100%);
      z-index: 190;
    }
    .trip-detail.visible { transform: translateY(0); }
    .trip-detail-header { padding: 14px 16px; }
    .trip-detail-title { font-size: 16px; }
    .trip-detail-body { padding: 12px 16px; }
    .trip-detail-close { width: 32px; height: 32px; font-size: 16px; }

    /* Stats overlay → compact at bottom-left */
    .stats-overlay {
      bottom: 8px; left: 8px; right: auto;
      gap: 4px;
    }
    .mini-stat { padding: 6px 8px; min-width: 50px; }
    .mini-stat-val { font-size: 13px; }
    .mini-stat-label { font-size: 7px; }

    /* Tooltip → hidden on mobile (touch doesn't hover) */
    .globe-tooltip { display: none; }

    /* Timeline mobile */
    .tl-wrap { margin: 24px auto; padding: 0 14px; }
    .tl-title { font-size: 22px; margin-bottom: 20px; }
    .tl { padding-left: 24px; }
    .tl-card-head { padding: 12px 14px; }
    .tl-card-title { font-size: 14px; }
    .tl-card-flags { font-size: 16px; }
    .tl-dg { grid-template-columns: 1fr; }

    /* Stats mobile */
    .stats-wrap { margin: 24px auto; padding: 0 14px; }
    .sg { grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .sg-c { padding: 12px 8px; }
    .sg-v { font-size: 20px; }
    .sg-i { font-size: 18px; }
    .bar-lbl { width: 80px; font-size: 10px; }
    .bar-trk { height: 20px; }
    .cg { grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .cg-c { padding: 10px; }
    .cg-f { font-size: 22px; }
    .cg-n { font-size: 11px; }
  }

  /* ========== SMALL MOBILE: <= 400px ========== */
  @media (max-width:400px) {
    .header h1 { font-size: 12px; }
    .nav-pill { padding: 3px 8px; font-size: 9px; }
    .trip-panel { height: 40vh; }
    .sg { grid-template-columns: repeat(2, 1fr); }
    .cg { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <h1>Travel Explorer</h1>
    <div class="nav-pills">
      <button class="nav-pill active" data-view="globe">Globe</button>
      <button class="nav-pill" data-view="timeline">Timeline</button>
      <button class="nav-pill" data-view="stats">Stats</button>
    </div>
  </div>
  <div class="header-stats" id="header-stats"></div>
</header>

<!-- GLOBE VIEW -->
<div class="view-panel active" id="view-globe">
  <div id="globe-container"></div>
  <div class="trip-panel" id="trip-panel">
    <div class="trip-panel-header"><h2>Trips</h2></div>
    <div class="trip-panel-body" id="trip-list"></div>
  </div>
  <button class="panel-toggle" id="panel-toggle">☰</button>
  <div class="trip-detail" id="trip-detail"></div>
  <div class="stats-overlay" id="stats-overlay"></div>
  <div class="globe-tooltip" id="tooltip"></div>
</div>

<!-- TIMELINE VIEW -->
<div class="view-panel" id="view-timeline">
  <div class="scroll-view">
    <div class="tl-wrap">
      <h2 class="tl-title">Trip <span>Timeline</span></h2>
      <div class="tl" id="timeline"></div>
    </div>
  </div>
</div>

<!-- STATS VIEW -->
<div class="view-panel" id="view-stats">
  <div class="scroll-view">
    <div class="stats-wrap" id="stats-content"></div>
  </div>
</div>

<script src="https://unpkg.com/globe.gl@2.33.0"></script>

// ============================================================================
// BUILD GLOBE DATA
// ============================================================================
function buildArcs(filterTrip) {
  const arcs = [];
  const trips = filterTrip ? TRIPS.filter(t=>t.id===filterTrip) : TRIPS;
  trips.forEach((trip, ti) => {
    trip.flights.forEach((fl, fi) => {
      const cities = parseLeg(fl.leg);
      for (let i=0; i<cities.length-1; i++) {
        const from=COORDS[cities[i]], to=COORDS[cities[i+1]];
        if (from && to) {
          arcs.push({
            startLat:from.lat, startLng:from.lng,
            endLat:to.lat, endLng:to.lng,
            color: trip.color, tripId: trip.id,
            label: fl.leg, airline: fl.airline||'', flight: fl.flight||'',
            aircraft: fl.aircraft||'', date: fl.date||'', fclass: fl.class||'',
            tripTitle: trip.title, isTransport: false,
            seq: fi, // sequence index for animation offset
          });
        }
      }
    });
  });
  return arcs;
}

// Surface paths for ground/water transport
function buildPaths(filterTrip) {
  const paths = [];
  const trips = filterTrip ? TRIPS.filter(t=>t.id===filterTrip) : TRIPS;
  trips.forEach(trip => {
    (trip.transport||[]).forEach(tr => {
      const cities = parseLeg(tr.leg);
      const coords = cities.map(c=>COORDS[c]).filter(Boolean);
      if (coords.length >= 2) {
        paths.push({
          coords: coords.map(c => ({lat:c.lat, lng:c.lng})),
          color: trip.color + 'aa',
          tripId: trip.id, tripTitle: trip.title,
          label: tr.leg, mode: tr.mode, type: tr.type||'',
          date: tr.date||'', note: tr.note||'',
        });
      }
    });
  });
  return paths;
}

// Label priority: 1 = always visible (major hubs), 2 = medium zoom, 3 = close zoom only
const CITY_PRIORITY = {
  // Priority 1 — major hubs, always visible even from far
  "Moscow":1, "Tokyo":1, "Bangkok":1, "Seoul":1, "Osaka":1, "Hanoi":1,
  "Almaty":1, "Okinawa":1, "Sapporo":1, "Antalya":1,
  // Priority 2 — secondary: visible at medium zoom, no clutter from far
  "Saint Petersburg":2, "Minsk":2, "Astrakhan":2,
  "Ho Chi Minh City":2, "Phuket":2, "Koh Samui":2, "Phu Quoc":2,
  "Kyoto":2, "Kobe":2, "Nha Trang":2, "Chengdu":2, "Shanghai":2,
  "Kaş":2, "Budennovsk":2, "Mineralnye Vody":2, "Lake Toya":2,
  // Priority 3 — POIs / micro-locations, close zoom only
  "Naha":3, "Churaumi Aquarium":3, "Phi Phi Islands":3,
  "Rawai, Phuket":3, "Hangzhou":3,
};

function buildPoints(filterTrip) {
  const pts = [], seen = new Set();
  const trips = filterTrip ? TRIPS.filter(t=>t.id===filterTrip) : TRIPS;
  trips.forEach(trip => {
    trip.cities.forEach(c => {
      if (COORDS[c] && !seen.has(c)) {
        seen.add(c);
        const pri = CITY_PRIORITY[c] || 2;
        pts.push({
          lat: COORDS[c].lat, lng: COORDS[c].lng,
          name: c, visits: cityVisits[c]||1, priority: pri,
          color: '#fff',
          size: pri === 1 ? 0.3 + (cityVisits[c]||1)*0.1 : pri === 2 ? 0.22 : 0.15,
          trips: (cityTrips[c]||[]).map(t=>({title:t.title,color:t.color,id:t.id})),
        });
      }
    });
    (trip.transport||[]).forEach(tr => {
      parseLeg(tr.leg).forEach(c => {
        if (COORDS[c] && !seen.has(c)) {
          seen.add(c);
          const pri = CITY_PRIORITY[c] || 3;
          pts.push({
            lat: COORDS[c].lat, lng: COORDS[c].lng,
            name: c, visits: 1, priority: pri,
            color: '#fff', size: pri <= 2 ? 0.2 : 0.12,
            trips: [{title:trip.title,color:trip.color,id:trip.id}],
          });
        }
      });
    });
  });
  return pts;
}

// LOD: filter labels by camera altitude
let currentAltitude = 2.2;
let allPoints = buildPoints();

function labelsForAltitude(pts, alt) {
  // alt ~2.5 = far, ~1.0 = medium, ~0.5 = close
  let maxPri;
  if (alt > 1.8) maxPri = 1;       // far: only major cities
  else if (alt > 0.9) maxPri = 2;   // medium: + secondary
  else maxPri = 3;                   // close: everything
  return pts.filter(p => p.priority <= maxPri);
}

// ============================================================================
// COLOR HELPERS
// ============================================================================
function lightenColor(hex, amount) {
  // Lighten a hex color by amount (0-100)
  hex = hex.replace('#','');
  if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  const r = Math.min(255, parseInt(hex.slice(0,2),16) + amount);
  const g = Math.min(255, parseInt(hex.slice(2,4),16) + amount);
  const b = Math.min(255, parseInt(hex.slice(4,6),16) + amount);
  return '#' + [r,g,b].map(c => c.toString(16).padStart(2,'0')).join('');
}

let selectedTrip = null;

const globe = Globe()
  // Vector globe — no raster texture, pure polygon surface
  .globeImageUrl('')
  .backgroundColor('#05050a')
  .backgroundImageUrl('https://unpkg.com/three-globe@2.33.0/example/img/night-sky.png')
  .showAtmosphere(true)
  .atmosphereColor('#4455dd')
  .atmosphereAltitude(0.15)
  // Arcs (flights) — gradient lines with gentle flowing animation
  .arcsData(buildArcs())
  .arcColor(d => [d.color, lightenColor(d.color, 40)])  // gradient: trip color → lighter
  .arcStroke(0.55)
  .arcDashLength(0.9)
  .arcDashGap(0.15)
  .arcDashAnimateTime(3000) // smooth directional flow
  .arcAltitude(d => {
    // Higher arcs for longer distances, graceful curve
    const dlat = Math.abs(d.startLat - d.endLat);
    const dlng = Math.abs(d.startLng - d.endLng);
    const dist = Math.sqrt(dlat*dlat + dlng*dlng);
    return Math.min(0.45, Math.max(0.06, dist * 0.004));
  })
  .arcCurveResolution(128)
  .arcLabel(d => '')
  .onArcHover(handleArcHover)
  .onArcClick(d => { if(d) selectTrip(d.tripId); })
  .arcsTransitionDuration(800)
  // Surface paths (ground/water transport) — thin dotted, hugging surface
  .pathsData(buildPaths())
  .pathPoints('coords')
  .pathPointLat('lat')
  .pathPointLng('lng')
  .pathColor(d => [d.color, lightenColor(d.color.replace('aa',''), 30) + 'cc'])
  .pathStroke(1.5)
  .pathDashLength(0.2)
  .pathDashGap(0.1)
  .pathDashAnimateTime(5000)
  .pathLabel(d => '')
  .onPathHover(handlePathHover)
  .onPathClick(d => { if(d) selectTrip(d.tripId); })
  .pathTransitionDuration(800)
  // Points (cities)
  .pointsData(allPoints)
  .pointLat('lat')
  .pointLng('lng')
  .pointColor(d => d.priority === 1 ? '#fff' : d.priority === 2 ? '#ddddf0' : '#aaaacc')
  .pointAltitude(0.005)
  .pointRadius('size')
  .pointLabel(d => '')
  .onPointHover(handlePointHover)
  .onPointClick(d => { if(d && d.trips.length) selectTrip(d.trips[0].id); })
  // City name labels — use HTML elements for crisp rendering at any zoom
  .htmlElementsData(labelsForAltitude(allPoints, currentAltitude))
  .htmlLat('lat')
  .htmlLng('lng')
  .htmlAltitude(0.012)
  .htmlElement(d => {
    const el = document.createElement('div');
    el.className = 'globe-label gl-p' + d.priority;
    el.textContent = d.name;
    el.style.pointerEvents = 'none';
    return el;
  })
  // Polygons (countries) — vector surface
  .polygonsData([])
  .polygonCapColor(d => {
    const iso = d.properties?.ADM0_A3 || d.properties?.adm0_a3 || '';
    if (hoveredCountryId && iso === hoveredCountryId) {
      return VISITED_ISO.has(iso) ? 'rgba(129,140,248,0.35)' : 'rgba(60,60,90,0.25)';
    }
    if (VISITED_ISO.has(iso)) return 'rgba(80,80,140,0.15)';
    return 'rgba(18,18,30,0.85)';  // dark land mass
  })
  .polygonSideColor(d => {
    const iso = d.properties?.ADM0_A3 || d.properties?.adm0_a3 || '';
    if (hoveredCountryId && iso === hoveredCountryId) return 'rgba(129,140,248,0.3)';
    return 'rgba(25,25,45,0.6)';
  })
  .polygonStrokeColor(d => {
    const iso = d.properties?.ADM0_A3 || d.properties?.adm0_a3 || '';
    if (hoveredCountryId && iso === hoveredCountryId) {
      return VISITED_ISO.has(iso) ? 'rgba(165,180,252,0.9)' : 'rgba(100,100,140,0.5)';
    }
    if (VISITED_ISO.has(iso)) return 'rgba(129,140,248,0.35)';
    return 'rgba(45,45,70,0.4)';  // subtle borders for all
  })
  .polygonAltitude(d => {
    const iso = d.properties?.ADM0_A3 || d.properties?.adm0_a3 || '';
    if (hoveredCountryId && iso === hoveredCountryId) return 0.012;
    if (VISITED_ISO.has(iso)) return 0.004;
    return 0.001;
  })
  .onPolygonHover(handleCountryHover)
  .onPolygonClick(d => {
    if (!d) return;
    const iso = d.properties?.ADM0_A3 || d.properties?.adm0_a3 || '';
    const countryName = Object.keys(ISO_A3).find(k=>ISO_A3[k]===iso);
    if (countryName) {
      const trip = TRIPS.find(t=>t.countries.includes(countryName));
      if (trip) selectTrip(trip.id);
    }
  })
  (document.getElementById('globe-container'));

// LOD: only update labels when zoom TIER changes (not on every small altitude shift)
// This prevents Globe.gl from destroying/recreating label objects every frame
let currentLodTier = 1; // 1=far, 2=medium, 3=close
function altToTier(alt) {
  if (alt > 1.8) return 1;
  if (alt > 0.9) return 2;
  return 3;
}

let lodDebounce = null;
function checkLOD() {
  const alt = globe.pointOfView().altitude;
  const tier = altToTier(alt);

  // Only rebuild labels when tier boundary is crossed
  if (tier !== currentLodTier) {
    currentLodTier = tier;
    currentAltitude = alt;
    // Debounce: wait 150ms after last tier change to avoid rapid flicker
    clearTimeout(lodDebounce);
    lodDebounce = setTimeout(() => {
      if (selectedTrip) return; // trip selected = all labels shown, skip LOD
      const filtered = labelsForAltitude(allPoints, globe.pointOfView().altitude);
      globe.htmlElementsData(filtered);
    }, 150);
  }

  // Smoothly scale points/strokes (these don't cause flicker — no object recreation)
  const pointScale = alt < 0.6 ? 2.0 : alt < 1.0 ? 1.5 : alt < 1.5 ? 1.2 : 1.0;
  globe.pointRadius(d => d.size * pointScale);
  if (!selectedTrip) {
    globe.arcStroke(alt < 0.8 ? 0.85 : 0.55);
    globe.pathStroke(alt < 0.8 ? 2.5 : 1.5);
  }
}
// Poll at 4Hz instead of every frame — sufficient for smooth LOD, much less overhead
setInterval(checkLOD, 250);

// Set globe material for vector look — dark ocean
const globeMaterial = globe.globeMaterial();
globeMaterial.color.set('#08081a');
globeMaterial.emissive.set('#060614');
globeMaterial.emissiveIntensity = 0.3;
globeMaterial.shininess = 0;

// Load country polygons (all countries for vector surface)
fetch('https://d2ad6b4ur7yvpq.cloudfront.net/naturalearth-3.3.0/ne_50m_admin_0_countries.geojson')
  .then(r => r.json())
  .then(geo => {
    countriesGeo = geo;
    globe.polygonsData(geo.features);
  });

// ============================================================================
// HOVER HANDLERS
// ============================================================================
const tooltip = document.getElementById('tooltip');
let lastMouseX = 0, lastMouseY = 0;
document.addEventListener('mousemove', e => { lastMouseX=e.clientX; lastMouseY=e.clientY; });

function positionTooltip() {
  const tw = tooltip.offsetWidth||280, th = tooltip.offsetHeight||100;
  let x = lastMouseX+14, y = lastMouseY+14;
  if (x+tw > window.innerWidth-12) x = lastMouseX-tw-14;
  if (y+th > window.innerHeight-12) y = lastMouseY-th-14;
  tooltip.style.left = x+'px'; tooltip.style.top = y+'px';
}

function showTooltip(html) {
  tooltip.innerHTML = html;
  tooltip.classList.add('visible');
  requestAnimationFrame(positionTooltip);
}
function hideTooltip() { tooltip.classList.remove('visible'); }

function handlePointHover(point) {
  if (!point) { hideTooltip(); return; }
  const trips = point.trips || [];
  showTooltip(`
    <div class="tt-title">${point.name}</div>
    <div class="tt-sub">${point.visits} visit${point.visits>1?'s':''}</div>
    ${trips.length ? `<div class="tt-trips">${trips.map(t=>
      `<div class="tt-trip"><div class="tt-dot" style="background:${t.color}"></div>${t.title}</div>`
    ).join('')}</div>` : ''}
  `);
}

const defaultArcColor = d => [d.color, lightenColor(d.color, 40)];
const dimArcColor = (d, ref) => d === ref
  ? [ref.color, lightenColor(ref.color, 60)]
  : [ref.color + '15', ref.color + '08'];

function handleArcHover(arc) {
  if (!arc) {
    hideTooltip();
    globe.arcStroke(0.55).arcColor(defaultArcColor);
    return;
  }
  showTooltip(`
    <div class="tt-title" style="color:${arc.color}">✈ ${arc.label}</div>
    <div class="tt-sub">
      ${arc.airline ? '<strong>'+arc.airline+'</strong>' : ''}
      ${arc.flight ? ' · '+arc.flight : ''}
      ${arc.aircraft ? ' · '+arc.aircraft : ''}
    </div>
    ${arc.date ? `<div class="tt-sub">${fmtDate(arc.date)}${arc.fclass?' · '+arc.fclass:''}</div>` : ''}
    <div class="tt-sub" style="margin-top:4px;opacity:0.5">${arc.tripTitle}</div>
  `);
  globe
    .arcStroke(d => d === arc ? 1.6 : 0.15)
    .arcColor(d => dimArcColor(d, arc));
}

function handlePathHover(path) {
  if (!path) {
    hideTooltip();
    globe.pathStroke(1.2).pathColor('color');
    return;
  }
  const icon = MODE_ICONS[path.mode] || '🚗';
  showTooltip(`
    <div class="tt-title" style="color:${path.color}">${icon} ${path.label}</div>
    <div class="tt-sub">
      ${path.type ? '<strong>'+path.type+'</strong>' : path.mode}
      ${path.date ? ' · '+fmtDate(path.date) : ''}
    </div>
    ${path.note ? `<div class="tt-sub" style="opacity:0.6">${path.note}</div>` : ''}
    <div class="tt-sub" style="margin-top:4px;opacity:0.5">${path.tripTitle}</div>
  `);
  globe
    .pathStroke(d => d === path ? 2.5 : 0.6)
    .pathColor(d => d === path ? path.color : path.color.replace('aa','30'));
}

function handleCountryHover(poly) {
  const iso = poly ? (poly.properties?.ADM0_A3 || poly.properties?.adm0_a3 || '') : null;
  const wasHovered = hoveredCountryId;

  if (iso && VISITED_ISO.has(iso)) {
    hoveredCountryId = iso;
    const name = poly.properties?.name || poly.properties?.NAME || '';
    const countryKey = Object.keys(ISO_A3).find(k=>ISO_A3[k]===iso);
    const flag = countryKey ? FLAGS[countryKey] : '';
    const visits = countryKey ? (countryVisits[countryKey]||0) : 0;
    const tripsHere = countryKey ? TRIPS.filter(t=>t.countries.includes(countryKey)) : [];

    showTooltip(`
      <div class="tt-title">${flag} ${name}</div>
      <div class="tt-sub">${visits} trip${visits>1?'s':''}</div>
      ${tripsHere.length ? `<div class="tt-trips">${tripsHere.map(t=>
        `<div class="tt-trip"><div class="tt-dot" style="background:${t.color}"></div>${t.title}</div>`
      ).join('')}</div>` : ''}
    `);
  } else {
    hoveredCountryId = null;
    if (!poly) hideTooltip();
  }

  // Re-render polygons only if hover state changed
  if (wasHovered !== hoveredCountryId && countriesGeo) {
    globe.polygonsData(countriesGeo.features);
  }
}

// ============================================================================
// TRIP PANEL
// ============================================================================
function renderTripList() {
  // Sort by date descending (newest first)
  const sorted = TRIPS.slice().sort((a,b) => new Date(b.date_start) - new Date(a.date_start));
  let lastYear = null;
  let html = '';
  sorted.forEach(t => {
    const year = new Date(t.date_start).getFullYear();
    if (year !== lastYear) {
      html += `<div class="year-divider"><span class="year-label">${year}</span></div>`;
      lastYear = year;
    }
    html += `
    <div class="trip-item ${selectedTrip===t.id?'active':''}" data-id="${t.id}">
      <div class="trip-item-top">
        <div class="trip-dot" style="background:${t.color};box-shadow:0 0 6px ${t.color}"></div>
        <div class="trip-item-title">${t.title}</div>
      </div>
      <div class="trip-item-meta">
        <span>${t.countries.map(c=>FLAGS[c]).join('')}</span>
        <span>${fmtDate(t.date_start).split(',')[0]}${t.date_end?' — '+fmtDate(t.date_end).split(',')[0]:' — now'}</span>
        ${t.status==='ongoing'?'<span class="badge-ongoing">ongoing</span>':''}
      </div>
    </div>`;
  });
  document.getElementById('trip-list').innerHTML = html;

  document.querySelectorAll('.trip-item').forEach(el => {
    el.addEventListener('click', () => selectTrip(el.dataset.id));
    el.addEventListener('mouseenter', () => {
      if (!selectedTrip) {
        const tid = el.dataset.id;
        globe.arcStroke(d => d.tripId===tid ? 1.0 : 0.08)
             .arcColor(d => d.tripId===tid ? [d.color, lightenColor(d.color,50)] : [d.color+'10', d.color+'05'])
             .pathStroke(d => d.tripId===tid ? 2.5 : 0.3)
             .pathColor(d => d.tripId===tid ? d.color : d.color.replace('aa','10'));
      }
    });
    el.addEventListener('mouseleave', () => {
      if (!selectedTrip) {
        globe.arcStroke(0.55).arcColor(defaultArcColor).pathStroke(1.5).pathColor('color');
      }
    });
  });
}
renderTripList();
document.getElementById('panel-toggle').addEventListener('click', () => {
  document.getElementById('trip-panel').classList.remove('hidden');
});

// ============================================================================
// TRIP SELECTION
// ============================================================================
function selectTrip(id) {
  if (selectedTrip === id) {
    selectedTrip = null;
    renderTripList();
    allPoints = buildPoints();
    globe.arcsData(buildArcs()).pathsData(buildPaths())
         .pointsData(allPoints).htmlElementsData(labelsForAltitude(allPoints, currentAltitude))
         .arcStroke(0.55).arcColor(defaultArcColor).pathStroke(1.5).pathColor('color');
    globe.pointOfView({ lat:25, lng:85, altitude:2.2 }, 1500);
    closeTripDetail();
    return;
  }
  selectedTrip = id;
  renderTripList();
  const tripPts = buildPoints(id);
  // When zooming into a trip, show all labels (no LOD filter)
  globe.arcsData(buildArcs(id)).pathsData(buildPaths(id))
       .pointsData(tripPts).htmlElementsData(tripPts)
       .arcStroke(0.65).arcColor(defaultArcColor).pathStroke(1.5).pathColor('color');

  // Fly to trip — focus on destination cities, not Moscow (unless Russia trip)
  const trip = TRIPS.find(t=>t.id===id);
  if (trip) {
    const isRussiaTrip = trip.countries.length === 1 && trip.countries[0] === 'Russia';
    const pts = trip.cities.map(c=>COORDS[c]).filter(Boolean);
    // Only include Moscow for Russia-domestic trips
    if (isRussiaTrip && COORDS['Moscow'] && !trip.cities.includes('Moscow')) {
      pts.push(COORDS['Moscow']);
    }
    if (pts.length === 0) return;
    const avgLat = pts.reduce((s,p)=>s+p.lat,0)/pts.length;
    const avgLng = pts.reduce((s,p)=>s+p.lng,0)/pts.length;
    const latSpread = Math.max(...pts.map(p=>p.lat))-Math.min(...pts.map(p=>p.lat));
    const lngSpread = Math.max(...pts.map(p=>p.lng))-Math.min(...pts.map(p=>p.lng));
    const spread = Math.max(latSpread, lngSpread);
    // Closer zoom for focused trips
    const alt = Math.max(0.5, Math.min(2.5, spread/35));
    globe.pointOfView({ lat:avgLat, lng:avgLng, altitude:alt }, 1500);
  }
  showTripDetail(id);
}

      <div style="font-size:22px;margin-bottom:6px;">${t.countries.map(c=>FLAGS[c]).join(' ')}</div>
      <div class="trip-detail-title">${t.title}</div>
      <div class="trip-detail-dates">${fmtDate(t.date_start)} — ${t.date_end?fmtDate(t.date_end):'ongoing'}</div>
      <div class="trip-detail-tags">
        <span class="trip-tag" style="background:${t.color}18;color:${t.color}">${days} days</span>
        <span class="trip-tag">${t.flights.length} flights</span>
        <span class="trip-tag">${(t.hotels||[]).length} hotels</span>
        ${t.status==='ongoing'?'<span class="trip-tag" style="background:rgba(52,211,153,0.12);color:var(--accent3)">ongoing</span>':''}
      </div>
    </div>
    <div class="trip-detail-body">
      <div class="detail-section">
        <div class="detail-section-title">✈ Flights</div>
        ${t.flights.map(f=>`
          <div class="d-item">
            <div class="d-item-primary d-item-accent">${f.leg}</div>
            <div class="d-item-secondary">${f.airline||''}${f.flight?' · '+f.flight:''}${f.aircraft?' · '+f.aircraft:''}</div>
            <div class="d-item-secondary">${f.date?fmtDate(f.date):''}${f.class?' · '+f.class:''}</div>
          </div>
        `).join('')}
      </div>
      ${(t.hotels&&t.hotels.length)?`
      <div class="detail-section">
        <div class="detail-section-title">🏨 Hotels</div>
        ${t.hotels.map(h=>`
          <div class="d-item">
            <div class="d-item-primary">${h.name}</div>
            <div class="d-item-secondary">${h.city}${h.nights?' · '+h.nights+' nights':''}</div>
          </div>
        `).join('')}
      </div>`:''}
      ${(t.transport&&t.transport.length)?`
      <div class="detail-section">
        <div class="detail-section-title">🚃 Transport</div>
        ${t.transport.map(tr=>`
          <div class="d-item">
            <div class="d-item-primary">${(MODE_ICONS[tr.mode]||'')} ${tr.leg}</div>
            <div class="d-item-secondary">${tr.type||tr.mode}${tr.date?' · '+fmtDate(tr.date):''}${tr.note?' · '+tr.note:''}</div>
          </div>
        `).join('')}
      </div>`:''}
      ${(t.activities&&t.activities.length)?`
      <div class="detail-section">
        <div class="detail-section-title">🎯 Activities</div>
        ${t.activities.map(a=>`
          <div class="d-item">
            <div class="d-item-primary">${a.name}</div>
            <div class="d-item-secondary">${fmtDate(a.date)}</div>
          </div>
        `).join('')}
      </div>`:''}
    </div>
  `;
  setTimeout(()=>el.classList.add('visible'), 10);
}
function closeTripDetail() { document.getElementById('trip-detail').classList.remove('visible'); }

// ============================================================================
// VIEW TOGGLE
// ============================================================================
document.querySelectorAll('.nav-pill').forEach(pill => {

    document.querySelectorAll('.nav-pill').forEach(p=>p.classList.remove('active'));

document.getElementById('timeline').innerHTML = TRIPS.slice().sort((a,b) => new Date(b.date_start) - new Date(a.date_start)).map(t => {

          ${t.transport.map(tr=>`<div class="tl-bi"><div class="tl-bi-m">${(MODE_ICONS[tr.mode]||'')} ${tr.leg}</div><div class="tl-bi-s">${tr.type||tr.mode} ${tr.date?'· '+fmtDate(tr.date):''} ${tr.note||''}</div></div>`).join('')}
        </div>`:''}
        ${(t.activities&&t.activities.length)?`<div class="tl-bl"><h4>🎯 Activities</h4>
          ${t.activities.map(a=>`<div class="tl-bi"><div class="tl-bi-m">${a.name}</div><div class="tl-bi-s">${fmtDate(a.date)}</div></div>`).join('')}
        </div>`:''}
      </div>
    </div>
  </div>`;
}).join('');

TRIPS.forEach(t=>t.flights.forEach(f=>{if(f.airline)airlines[f.airline]=(airlines[f.airline]||0)+1;}));

// Resize handling
window.addEventListener('resize', () => {
  globe.width(window.innerWidth).height(window.innerHeight);
});

// ============================================================================
// MOBILE INTERACTIONS
// ============================================================================
const isMobile = () => window.innerWidth <= 768;

// On mobile: hide trip panel when selecting a trip (detail takes over)
const origSelectTrip = selectTrip;
selectTrip = function(id) {
  origSelectTrip(id);
  if (isMobile() && selectedTrip) {
    document.getElementById('trip-panel').classList.add('hidden');
  }
};

// Swipe down to dismiss trip panel (bottom sheet)
(function() {
  const panel = document.getElementById('trip-panel');
  let startY = 0, currentY = 0, dragging = false;

  panel.addEventListener('touchstart', (e) => {
    // Only start drag from header area
    const header = panel.querySelector('.trip-panel-header');
    const rect = header.getBoundingClientRect();
    if (e.touches[0].clientY < rect.top || e.touches[0].clientY > rect.bottom) return;
    startY = e.touches[0].clientY;
    dragging = true;
    panel.style.transition = 'none';
  }, { passive: true });

  panel.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    currentY = e.touches[0].clientY;
    const dy = currentY - startY;
    if (dy > 0) { // only drag down
      panel.style.transform = `translateY(${dy}px)`;
    }
  }, { passive: true });

  panel.addEventListener('touchend', () => {
    if (!dragging) return;
    dragging = false;
    panel.style.transition = '';
    const dy = currentY - startY;
    if (dy > 80) {
      panel.classList.add('hidden');
    }
    panel.style.transform = '';
  });
})();

// Panel toggle text for mobile
const toggleBtn = document.getElementById('panel-toggle');
if (isMobile()) toggleBtn.textContent = '☰ Trips';
